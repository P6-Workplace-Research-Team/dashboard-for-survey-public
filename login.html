<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>нҢҖ лҢҖмӢңліҙл“ң лЎңк·ёмқё</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 32px;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: black;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.85;
    }

    #message {
      margin-top: 10px;
      font-size: 13px;
      color: red;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h1>нҢҖ лҢҖмӢңліҙл“ң</h1>

    <input
      id="password"
      type="password"
      placeholder="л№„л°ҖлІҲнҳё мһ…л Ҙ"
    />

    <button id="loginBtn">мһ…мһҘ</button>

    <p id="message"></p>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- л„Ҳк°Җ л§Ңл“  client -->
  <script src="./supabase-client.js"></script>

  <script>
    const TEAM_EMAIL = "team-dashboard@yourcompany.com"; // рҹ‘ү Supabaseм—җ л§Ңл“  кі„м •

    const loginBtn = document.getElementById("loginBtn");
    const message = document.getElementById("message");

    // мқҙлҜё лЎңк·ёмқё мғҒнғңл©ҙ л°”лЎң мқҙлҸҷ
    async function checkSession() {
      const { data } = await supabase.auth.getSession();
      if (data.session) {
        window.location.href = "./index.html";
      }
    }

    checkSession();

    // лЎңк·ёмқё
    loginBtn.addEventListener("click", async () => {
      const password = document.getElementById("password").value;

      if (!password) {
        message.textContent = "л№„л°ҖлІҲнҳёлҘј мһ…л Ҙн•ҙмЈјм„ёмҡ”.";
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "м ‘мҶҚ мӨ‘...";

      const { error } = await supabase.auth.signInWithPassword({
        email: TEAM_EMAIL,
        password: password,
      });

      if (error) {
        message.textContent = "л№„л°ҖлІҲнҳёк°Җ л§һм§Җ м•ҠмҠөлӢҲлӢӨ.";
        loginBtn.disabled = false;
        loginBtn.textContent = "мһ…мһҘ";
        return;
      }

      window.location.href = "./index.html";
    });
  </script>

</body>
</html>
