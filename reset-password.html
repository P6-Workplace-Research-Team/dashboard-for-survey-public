<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 재설정</title>
</head>
<body>
  <h1>새 비밀번호 설정</h1>

  <input id="newPassword" type="password" placeholder="새 비밀번호" />
  <button id="updateBtn">비밀번호 변경</button>

  <p id="message"></p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-client.js"></script>

  <script>
    const updateBtn = document.getElementById("updateBtn");
    const message = document.getElementById("message");

    updateBtn.addEventListener("click", async () => {
      const password = document.getElementById("newPassword").value;

      if (!password) {
        message.textContent = "새 비밀번호를 입력해주세요.";
        return;
      }

      updateBtn.disabled = true;
      updateBtn.textContent = "변경 중...";

      const { data: sessionData } = await supabase.auth.getSession();

      if (!sessionData.session) {
        message.textContent = "비밀번호 재설정 세션이 없습니다. 이메일 링크를 다시 눌러주세요.";
        updateBtn.disabled = false;
        updateBtn.textContent = "비밀번호 변경";
        return;
      }

      const { error } = await supabase.auth.updateUser({
        password: password
      });

      if (error) {
        message.textContent = "변경 실패: " + error.message;
        updateBtn.disabled = false;
        updateBtn.textContent = "비밀번호 변경";
        return;
      }

      message.textContent = "비밀번호가 변경되었습니다. 로그인 페이지로 이동합니다.";

      setTimeout(() => {
        window.location.href = "./login.html";
      }, 1200);
    });
  </script>
</body>
</html>
